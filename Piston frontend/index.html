<!DOCTYPE html>
    <html>
        <head>
            <title>
                Piston AI
            </title>
            <meta charset="UTF-8">
            <link rel="icon" type="image/png" href="src/src/favicon.png">
            <meta name="viewport" content="width=device-width, initial-scale=0.9, maximum-scale=0.9, user-scalable=no">
            <link rel="apple-touch-icon" sizes="400x400" href="favicon.png">
            <meta name="mobile-web-app-capable" content="yes">
            <link rel="icon" type="image/x-icon" href="favicon.png">
            <style>
                @font-face {
                    font-family: "JetbrainsMono";
                    src: url("src/JetBrainsMono.ttf") format("truetype");
                }

                body, html {
                    height: 100%;            
                    scrollbar-width: none;    
                }

                * {
                    margin: 0;
                    font-family: "JetbrainsMono", sans-serif;
                    color: white;
                    user-select: none;
                    -webkit-user-select: none;
                    -moz-user-select: none;
                    -ms-user-select: none;
                }

                body {
                    display: flex;
                    visibility: hidden;
                    background-image: url("src/src/wallpapers/gradient-1.jpg");
                    margin: 3%;
                    justify-content: center;
                    overflow: hidden;
                    overscroll-behavior-y: none;
                    background-size: cover;
                    background-repeat: no-repeat;
                    background-position: center;
                    transition: opacity 0.2s ease;
                    overscroll-behavior: none;
                    scrollbar-width: none;
                }

                .greeting-h2 {
                    font-size: 3em;
                    position: absolute;
                    font-weight: 400;
                    border: 1px solid gray;
                    border-radius: 30px;
                    background-color:rgba(0, 0, 0, 0.185);
                    backdrop-filter: blur(2px);
                    padding-left: 0.5em;
                    padding-right: 0.5em;
                    box-shadow: 0 6px 20px rgba(0,0,0,0.8);
                }

                body.blur-active > *:not(#setUp-container, #deleteAllDataPrompt) {
                    filter: blur(10px);
                    pointer-events: none;
                }

                .setUp-container {
                    visibility: hidden;
                    position: absolute;
                    border: 1px solid gray;
                    border-radius:  10%;
                    margin: 5%;
                    align-items: center;
                    background-color: #363636;
                    border: 1px solid gray;
                    border-radius: 10px;
                    padding: 1.5em;
                    box-shadow: 0 0 20px rgba(0,0,0,0.3);
                    backdrop-filter: blur(3px);
                    z-index: 1000;
                    justify-content: center;
                    padding: 5%;
                    transition: opacity 0.2s ease;
                }

                #setup-input {
                    border: 1px solid gray;
                    border-radius: 10px;
                    margin-top: 1.5em;
                    height: 2em;
                    color: white;
                    background-color: #000000;
                    padding-left: 3%;
                }

                #setup-done-btn {
                    border: none;
                    border-radius: 10px;
                    margin-top: 1.5em;
                    background-color: #0080ff;
                    height: 2em;
                    color: white;
                    cursor: pointer;
                    font-family:'Lucida Sans', 'Lucida Sans Regular', 'Lucida Grande', 'Lucida Sans Unicode', Geneva, Verdana, sans-serif;
                    padding-right: 4%;
                }

                .credit {
                    color: gray; font-size: x-small; position: fixed; bottom: 4px;
                    background-color: none;
                    padding: 0.25em 0.25em 0.25em 0.25em;
                    border-radius: 1em;
                    transition: background-color 0.2s ease;
                }

                .tc {
                    border-radius: 25px;
                    border: 1px solid gray;
                    display: flex;
                    justify-content: center;
                    position: absolute;
                    padding-left: 1em;
                    padding-right: 1em;
                    top: 10%;
                    left: 10%;
                    backdrop-filter: blur(3px);
                    flex-direction: column;
                    background-color: rgba(0, 0, 0, 0.185);
                    box-shadow: 0 6px 20px rgba(0,0,0,0.8);
                }

                .h1-time {
                    font-size: 5em;
                    font-weight: 300;
                } 

                #temp {
                    font-size: 5em;
                    font-weight: 300;
                    color: #a6ff01;
                    margin-bottom: 10px;
                }

                .weather {
                    border-radius: 25px;
                    border: 1px solid gray;
                    display: flex;
                    justify-content: center;
                    position: absolute;
                    padding-left: 1em;
                    padding-right: 1em;
                    top: 10%;
                    right: 10%;
                    flex-direction: column;
                    background-color: rgba(0,0,0,0.1);
                    backdrop-filter: blur(3px);
                    box-shadow: 0 6px 20px rgba(0,0,0,0.8);
                }

                .startSTT {
                    justify-content: center;
                    align-items: center;
                    border: 1.5px solid gray;
                    border-radius: 10em;
                    position: absolute;
                    bottom: 10px;
                    right: 10px;
                    height: 45px;
                    width: 45px;
                    background-size: cover;
                    background-color: rgba(0, 0, 0, 0.5);
                    display: flex;
                    transition: 
                        background-color 0.2s ease,
                        opacity 0.2s ease;
                    backdrop-filter: blur(3px);
                }

                #sendBtn {
                    border: 1.5px solid gray;
                    border-radius: 10em;
                    position: absolute;
                    bottom: 10px;
                    height: 40px;
                    width: 40px;
                    background-size: cover;
                    background-color: black;
                    display: flex;
                    justify-content: center;
                    align-items: center;
                    transition: 
                        background-color 0.2s ease,
                        opacity 0.2s ease;
                    z-index: 7;
                    opacity: 100%;
                }

                #sendBtn:hover {
                    cursor: pointer;
                    background-color: gray;
                }

                #sendBtn:disabled {
                    cursor: not-allowed;
                    opacity: 20%;
                }

                .startSTT:hover {
                    cursor: pointer;
                    background-color: gray;
                }

                .startSTT:disabled {
                    cursor: not-allowed;
                    opacity: 20%;
                }

                .abortSTT {
                    border: 1px solid gray;
                    border-radius: 10em;
                    position: absolute;
                    bottom: 10px;
                    right: 10px;
                    height: 45px;
                    width: 45px;
                    background-size: cover;
                    background-color: #000000;
                    display: flex;
                    justify-content: center;
                    align-items: center;
                    transition:
                        background-color 0.2s ease,
                        opacity 0.2s ease;
                    visibility: hidden;
                }

                .abortSTT:hover {
                    background-color: gray;
                    cursor: pointer;
                }

                #speechRecDiv {
                    display: flex;
                    flex-direction: column;
                }

                #SRHint {
                    background-color: white;
                    border: 3px ;
                    visibility: visible;
                    color: black;
                    border-radius: 3px;
                    padding: 3px;
                    position: absolute;
                    right: 10px;
                    visibility: hidden;

                    transform: translateY(5px);

                    transition: 
                        opacity 0.25s ease,
                        transform 0.25s ease;
                }

                #SRHint.show {
                    opacity: 1;
                    visibility: visible;
                    transform: translateY(0);
                    z-index: 1000;
                }

                #AIbox {
                    overflow-y: auto;
                    border: 1.5px solid gray;
                    border-radius: 30px;
                    padding-left: 5%;
                    padding-right: 5%;
                    visibility: hidden;
                    display: flex;
                    flex-direction: column;
                    position: absolute;
                    justify-items: center;
                    z-index: 5;
                    width: 30%;
                    height: 50%;
                    backdrop-filter: blur(3px);
                    background-color: rgba(66, 66, 66, 0.15);
                    transition: 
                        backdrop-filter 0.2s ease,
                        transform 0.2s ease,
                        background-color 0.2s ease;
                    box-shadow: 0 6px 20px rgb(0,0,0,0.8);
                    max-height: 80vh;
                    scroll-behavior: smooth;
                }

                #AIbox:hover {
                    cursor: pointer;
                    backdrop-filter: blur(5px);
                }

                #manIn {
                    border: 1px solid gray;
                    border-radius: 10em;
                    position: absolute;
                    bottom: 10px;
                    width: 30em;
                    height: 50px;
                    padding-left: 10px;
                    color: black;
                    z-index: 6;
                    box-sizing: border-box;
                    transition:
                        opacity 0.2s ease;    
                }

                #manIn:disabled {
                    cursor: not-allowed;
				}

                #quoteOfTheDay {
                    font-style: italic;
                    color: white;
                    user-select: text;
                    margin-right: 5px;
                }

                #quoteAuthor {
                    color: rgba(231, 231, 231, 0.482);
                }

                .pistonSettings {
                    display: flex;
                    align-items: center;
                    justify-content: center;
                    width: 3.5em;
                    height: 3.5em;
                    border: 1.5px solid gray;
                    border-radius: 2em;
                    background-color: rgba(0,0,0,0.185);
                    position: absolute;
                    right: 1em;
                    top: 1em;
                    cursor: pointer;
                    opacity: 100%;
                    rotate: 0deg;
                    transition: opacity 0.2s ease, background-color 0.2s ease, rotate 1s ease;
                }

                .pistonSettings:hover {
                    background-color: rgba(0,0,0,0.3);
                }

                #settingsContainer {
                    visibility: hidden;
                    position: absolute;
                    border: 1px solid gray;
                    backdrop-filter: blur(3px);
                    background-color:rgba(0, 0, 0, 0.525);
                    border-radius: 10px;
                    overflow-x: hidden;
                    right: 1em;
                    box-shadow: 0 0 10px 2px rgb(0, 0, 0, 0.8);
                    transition: opacity 0.5s ease-in-out;
                    opacity: 0%;
                    overflow-y: auto;
                }

                #wallpapersContainer {
                    display: flex;
                    flex-wrap: wrap;
                    gap: 0.5em;
                    padding-left: 0.5em;
                    padding-top: 0.5em;
                    padding-bottom: 0.5em;
                }

                #memoryAddNoti {
                    border: 1px solid gray;
                    border-radius: 10px;
                    background-color: rgba(0,0,0,0.5);
                    backdrop-filter: blur(3px);
                    padding-left: 5em;
                    padding-right: 5em;
                    display: flex;
                    flex-direction: column;
                    align-items: center;
                    height: 6em;
                    overflow-y:auto;
                    visibility: hidden;
                    padding-top: 0.5em;
                    transition: transform 0.5s ease-in-out;
                    z-index: 1200;
                }

                #memorydescription {
                    color: white;
                    font-size: medium;
                }

                #todoBox {
                    display: flex;
                    flex-direction: column;
                    visibility: hidden;
                    background-color: rgba(0, 0, 0, 0.185);
                    backdrop-filter: blur(5px);
                    border: 1px solid gray;
                    border-radius: 25px;
                    height: 45%;
                    box-shadow: 0 6px 20px, (rgba(0, 0, 0, 0.8));
                    position: absolute;
                    padding-left: 1em;
                    padding-right: 1em;
                    padding-top: 0.3em;
                }

                #todoList {
                    padding-left: 1em;
                    display: flex;
                    flex-direction: column;
                    padding-top: 0.5em; 
                    overflow-y: auto;
                    overflow-x: none;
                    gap: 0.5em;
                }

                #todoInputFields {
                    padding: 0 0 0 0;
                    border-radius: 10px;
                    overflow: none;
                }

                #createReminder {
                    backdrop-filter: blur(3px);
                    background-color: rgba(0,0,0,0.185);
                    display: flex;
                    border: none;
                    border-radius:1em;
                    cursor: pointer;
                    transition: background-color 0.2s ease-in-out;
                    margin-left: 10px;
                    height: 35px;
                    width: 35px;
                    justify-content: center;
                    align-items: center;
                }

                #createReminder:hover {
                    background-color: rgba(0,0,0,0.6);
                }

                .saveReminderDisabled {
                    cursor: not-allowed;
                    opacity: 20%;
                }

                .separator {
                    height: 1px;
                    width: 95%;
                    border: none;
                    margin: 0 auto;
                    background-color: white;
                }

                .dataManagementStyle {
                    border: 1px solid gray;
                    border-radius: 10px;
                    color: white;
                    background-color: rgba(0,0,0,0.185);
                    transition: opacity 0.2s ease-in-out;
                    opacity: 100%;
                }

                .dataManagementStyleDanger {
                    border: 1px solid gray;
                    border-radius: 10px;
                    color: red;
                    background-color: rgba(0,0,0,0.185);
                    transition: opacity 0.2s ease-in-out;
                    opacity: 100%;
                }

                .dataManagementStyle:hover {
                    opacity: 50%;
                    cursor: pointer;
                }

                .dataManagementStyleDanger:hover {
                    opacity: 50%;
                    cursor: pointer;
                }

                #dataManagementContainer {
                    display: flex;
                    flex-direction: column;
                    gap: 0.2em;
                    padding: 0.1em 0.5em 0.1em 0.5em;
                }

                #deleteAllDataPrompt {
                    border: 1px solid gray;
                    border-radius: 10px;
                    backdrop-filter: blur(3px);
                    background-color: rgba(0,0,0,0.185);
                    display: flex;
                    flex-direction: column;
                    padding: 10px 1em 10px 1em;
                    height: 7em;
                    visibility: hidden;
                    transition: opacity 0.2s ease;
                    position: absolute;
                    z-index: 1000;
                    transition: opacity 0.2s ease;
                }
                
                #cancelDelete {
                    border-radius: 5px;
                    border: none;
                    color: white;
                    background-color: black;
                    padding: 3px 0.5em 3px 0.5em;
                    font-size: 1em;
                    transition: opacity 0.2s ease-in-out;
                }

                #cancelDelete:hover {
                    opacity: 0.6;
                    cursor: pointer;
                }

                #confirmDelete {
                    border-radius: 5px;
                    border: none;
                    color: white;
                    background-color: rgba(220,0,0,100);
                    padding: 3px 0.5em 3px 0.5em;
                    font-size: 1em;
                    transition: opacity 0.2s ease-in-out;
                }

                #confirmDelete:hover {
                    opacity: 0.6;
                    cursor: pointer;
                }

                #fullscreenFocusMode {
                    border-radius: 5px;
                    background-color: rgba(0,0,0,0.185);
                    backdrop-filter: blur(5px);
                    border: none;
                    height: 30px;
                    width: 30px;
                    cursor: pointer;
                    display: flex;
                    justify-content: center;
                    align-items: center;
                    margin-top: 1em;
                    transition: background-color 0.2s ease;
                    visibility: visible;
                }

                #fullscreenFocusMode:hover {
                    background-color: rgba(0,0,0,0.3);
                    cursor: pointer;
                }

                #timerUtils {
                    display: flex;
                    flex-direction: column;
                    gap: 5px;
                    background-color: rgba(0,0,0,0.185);
                    backdrop-filter: blur(5px);
                    border: 1px solid gray;
                    position: absolute;
                    justify-content: center;
                    align-items: center;
                    padding: 3px;
                    border-radius: 10px;
                }

                .timerBtns {
                    border-radius: 35px;
                    border: none;
                    background-color: rgba(0,0,0,0.185);
                    width: 35px;
                    height: 35px;
                    display: flex;
                    justify-content: center;
                    align-items: center;
                    cursor: pointer;
                    transition: background-color 0.2s ease;
                }

                .timerBtns:hover {
                    background-color: rgba(0,0,0,0.3);
                }

                #utilBox {
                    display: flex;
                    flex-direction: column;
                    background-color: rgba(0, 0, 0, 0.185);
                    backdrop-filter: blur(5px);
                    border: 1px solid gray;
                    border-radius: 25px;
                    box-shadow: 0 6px 20px, (rgba(0, 0, 0, 0.8));
                    position: absolute;
                    padding-left: 1em;
                    padding-right: 1em;
                    padding-top: 0.3em;
                    visibility: hidden;
                    transition: opacity 0.2s ease;
                }

                #utilBoxItems {
                    padding-left: 1em;
                    display: flex;
                    flex-direction: column;
                    padding-top: 0.5em; 
                    overflow-y: auto;
                    overflow-x: none;
                    gap: 0.5em;
                    padding-bottom: 5px;
                    justify-content: center;
                    align-items: center;
                }

                #startTimer {
                    border-radius: 30px;
                    background-color: white;
                    transition: all 0.2s ease;
                    color: black;
                    height: 2em;
                    width: 80%;
                    border: none;
                }

                #startTimer:hover {
                    opacity: 60%;
                    cursor: pointer;
                }

                .timerInputFields {
                    color: black;
                    text-align: center;
                    font-size: 2.67em;
                    margin: 5px;
                    border-radius: 10px;
                    border:none;
                    width: 3em;
                }

                #startTimer:disabled {
                    opacity: 20%;
                    cursor: not-allowed;
                }

                #startStopwatch {
                    border-radius: 30px;
                    background-color: white;
                    transition: all 0.2s ease;
                    color: black;
                    height: 2em;
                    cursor: pointer;
                    width: 80%;
                    border: none;
                    transition: all 0.2s ease;
                }

                #startStopwatch:hover {
                    opacity: 60%;
                }

                #startStopwatch:disabled {
                    opacity: 20%;
                    cursor: not-allowed;
                }

                .timerActiveBtn {
                    height: 35px;
                    width: calc(16px * 4);
                    border-radius: 17.5px;
                    background-color: white;
                    border: white;
                    display: flex;
                    justify-content: center;
                    align-items: center;
                    margin: 5px;
                    transition: all 0.2s ease;
                    color: black;
                    font-size: 1em;
                }

                .timerActiveBtn:hover {
                    opacity: 60%;
                    cursor: pointer;
                }

                .stopwatchBtns {
                    height: 35px;
                    width: calc(16px * 4);
                    border-radius: 17.5px;
                    background-color: white;
                    border: white;
                    display: flex;
                    justify-content: center;
                    align-items: center;
                    margin: 5px;
                    transition: all 0.2s ease;
                    color: black;
                    font-size: 1em;
                }

                .stopwatchBtns:hover {
                    cursor: pointer;
                    opacity: 60%;
                }

                #timeoutReset {
                    border-radius: 17.5px;
                    height: 3d5px;
                    background-color: white;
                    color: black;
                    transition: all 0.2s ease;
                    opacity: 100%;
                    border: none;
                    margin: 5px;
                }

                #timeoutReset:hover {
                    cursor: pointer;
                    opacity: 60%;
                }
            </style>
        </head>
        <body>
            <h1 class="greeting-h2" id="greeting">
                Welcome back!
            </h1>
            <div class="setUp-container" id="setUp-container">
                <h3>Setup Piston AI</h3>
                <p><br>What should we call you?</p>
                <input type="text" id="setup-input" value="" placeholder="Your name here">
                <br>
                <button id="setup-done-btn"><p>Done :&#41;</p></button>
                <p id="setup-warning" style="color: red; font-size: x-small; margin-top: 0.5em; visibility: hidden; z-index: 1001;"></p>
            </div>
            <div id="tc" class="tc">
                <div style="display: flex; margin-bottom:10px;">            
                    <h1 id="hour" class="h1-time">--</h1>
                    <h1 class="h1-time" id="colon">:</h1>
                    <h1 id="minute" class="h1-time">--</h1>
                    <button id="fullscreenFocusMode">
                        <img width="25px" height"25px" src="src/src/fullscreenFocus.png">
                    </button>
                </div>
                <div id="dc" style="display: flex; flex-direction: row; ">
                    <h1 id="weekday" style="color: #a6ff01">--</h1>
                    <div>&nbsp;&nbsp;</div>
                    <h1 id="date">--</h1>
                </div>
                <div id="qotd">
                    <p id="quoteOfTheDay"></p>
                    <p id="quoteAuthor"></p>
                </div>
            </div>
            <div id="weather" class="weather">
                <h1 class="h1-time" id="temp">--&deg;C</h1>
                <div style="display: flex; flex-direction: row;" id="weatherInfo">
                    <img src="src/src/noData.png" id="weatherData" draggable="false">
                    <h1>&nbsp;</h1>
                    <h1 id="weatherText" style="font-weight: 600">No data</h1>
                </div>
            </div>
            <div id="timerUtils">
                <p style="color:white; margin: 3px;">utils</p>
                <button class="timerBtns" id="stopwatchBtn">
                    <img style="height:25px; width: 25px;" src="src/src/stopwatch.png">
                </button>
                <button class="timerBtns" id="timerBtn">
                    <img style="height:25px; width: 25px;" src="src/src/timer.png">
                </button>
            </div>
            <div id="utilBox">
                <div style="width: 100%; display: flex; flex-direction: row; align-items: center; padding-bottom: 3px;">
                    <h2 id="TUTitle" style="font-weight: 300;">Title</h2>
                </div>
                <hr style="background-color: gray;">
                <div id="utilBoxItems"></div>
            </div>
            <div id="todoBox">
                <div style="width: 100%; display: flex; flex-direction: row; align-items: center; padding-bottom: 3px;">
                    <h1 style="font-weight: 300;">To-Do</h1>
                    <button id="createReminder">
                        <img src="src/src/add.png" id="createReminderImg" style="height: 25px; width: 25px; rotate: 0deg; transition: rotate 0.2s ease-in-out">
                    </button>
                </div>
                <hr style="background-color: gray;">
                <div id="todoList">
                </div>
            </div>
            <div id="speechRecDiv">
                <div id="SRHint">
                    <p id="SRHintTxt" style="color: black">Press to start speech recognition</p>
                </div>
                <button class="startSTT" id="startSTT" onclick="startRecording()">
                    <img id="startSTTImg" src="src/src/STT.png" style="height: 80%;" draggable="false">
                </button>
                <input id="manIn" placeholder="Ask Piston AI">
                <button class="startSTT" id="sendBtn">
                    <img id="sendBtnImg" src="src/src/send.png" style="height: 80%;" draggable="false">
                </button> 
                <button id="abortSTT" class="abortSTT">
                    <img src="src/src/abort.png" draggable="false" style="height: 80%">
                </button>
            </div>
            <div id="AIbox"></div>
            <button id="pistonSettings" class="pistonSettings">
                <img id="pistonSettingsIMG" src="src/src/settings.png" style="width: 2em; height: 2em">
            </button>
            <div id="settingsContainer">
                <h1 style="margin-left: 0.35em; font-weight: 250;">Wallpapers</h1>
                <div id="wallpapersContainer">
                </div>  
                <hr class="separator">
                <h1 style="margin-left: 0.35em; font-weight: 250;">Data</h1>
                <div id="dataManagementContainer">
                    <button id="exportData" class="dataManagementStyle" onclick="exportDataFunc()">Export data</button>
                    <input type="file" id="dataUpload" name="fileUpload" style="display: none" accept=".json">
                    <button id="importData" class="dataManagementStyle" onclick="document.getElementById('dataUpload').click()">Import data</button>
                    <button id="deleteData" class="dataManagementStyleDanger">Delete all data</button>
                </div>
            </div>
            <div id="deleteAllDataPrompt">
                <h2>Are you sure?</h2>
                <p>Deleting all data CANNOT be undone!</p>
                <div style="display: flex; flex-direction: row; width: 100%; gap: 1em; position: absolute; bottom: 0; padding-bottom: 1em;">
                    <button id="cancelDelete">Cancel</button>
                    <button id="confirmDelete">Confirm</button>
                </div>
            </div>
            <div id="memoryAddNoti">
                <h2 style="font-weight: 600; color: white;">Memory added</h2>
                <p id="memorydescription"></p>
            </div>
            <p class="credit">Brought to you by milo1004</p>
            <script src="src/src.js"></script>
        </body>
    </html>
