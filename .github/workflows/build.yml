name: Build PyWebView App

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      # Install system dependencies for PyWebView (GTK/WebKit)
      - name: Install system packages
        run: |
          sudo apt-get update
          sudo apt-get install -y \
          libwebkitgtk-6.0-dev \
          libgtk-3-dev \
          libgirepository1.0-dev \
          build-essential \
          pkg-config \
          python3-dev

      - name: Install Python dependencies
        run: |
          pip install nuitka pywebview

      - name: Find repo
        run: ls /home/runner/work/Piston-AI

      - name: Compile with Nuitka
        working-directory: '/home/runner/work/Piston-AI/Piston frotend'
        run: python -m nuitka --clang --lto=yes --include-data-dir=src/=src/ --include-data-files=index.html=index.html --include-data-files=main.py=main.py main.py
